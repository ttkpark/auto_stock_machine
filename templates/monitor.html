{% extends "base.html" %}
{% block content %}
<div class="grid-2">
  <div class="card">
    <h2>모니터링 설정</h2>
    <p class="sub">보유 종목의 가격 변동을 자동으로 관찰하고, 기준을 넘으면 AI 매도 판단을 트리거합니다.</p>

    <form id="monitor-form">
      <div style="margin:10px 0;">
        <label><input type="checkbox" id="mon-enabled"> <b>모니터링 활성화</b></label>
      </div>
      <div style="margin:8px 0;">
        <label style="display:inline-block;width:160px;">점검 주기 (초)</label>
        <input type="number" id="mon-interval" value="300" min="60" step="60" style="width:100px;padding:6px;border:1px solid #ccc;border-radius:4px;">
        <span class="sub"> (최소 60초)</span>
      </div>
      <div style="margin:8px 0;">
        <label style="display:inline-block;width:160px;">수익 알림 기준 (%)</label>
        <input type="number" id="mon-profit" value="5.0" step="0.5" style="width:100px;padding:6px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div style="margin:8px 0;">
        <label style="display:inline-block;width:160px;">손실 알림 기준 (%)</label>
        <input type="number" id="mon-loss" value="-3.0" step="0.5" style="width:100px;padding:6px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div style="margin:8px 0;">
        <label style="display:inline-block;width:160px;">변동성 알림 기준 (%)</label>
        <input type="number" id="mon-volatility" value="3.0" step="0.5" style="width:100px;padding:6px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div style="margin:10px 0;">
        <label><input type="checkbox" id="mon-auto-sell"> <b>자동 AI 매도 판단</b> (기준 초과 시 자동으로 매도 로직 실행)</label>
      </div>
      <div style="margin:10px 0;">
        <label><input type="checkbox" id="mon-notify" checked> <b>텔레그램 알림 전송</b></label>
      </div>
      <button type="submit" class="btn btn-primary">설정 저장</button>
    </form>
  </div>

  <div class="card">
    <h2>모니터 상태</h2>
    <div id="monitor-status">
      <p class="sub">로딩 중...</p>
    </div>

    <h2 style="margin-top:16px;">최근 알림</h2>
    <div id="alert-list" style="max-height:400px; overflow-y:auto;">
      <p class="sub">알림 없음</p>
    </div>
  </div>
</div>

<script>
async function loadMonitor() {
  const resp = await fetch('/api/v1/monitor');
  const data = await resp.json();
  if (!data.ok) return;

  const cfg = data.config;
  document.getElementById('mon-enabled').checked = cfg.enabled;
  document.getElementById('mon-interval').value = cfg.check_interval_sec;
  document.getElementById('mon-profit').value = cfg.profit_threshold;
  document.getElementById('mon-loss').value = cfg.loss_threshold;
  document.getElementById('mon-volatility').value = cfg.volatility_threshold;
  document.getElementById('mon-auto-sell').checked = cfg.auto_sell_enabled;
  document.getElementById('mon-notify').checked = cfg.notify_on_threshold !== false;

  const state = data.state;
  document.getElementById('monitor-status').innerHTML = `
    <table>
      <tr><td><b>실행 상태</b></td><td><span class="${state.running ? 'ok' : 'bad'}">${state.running ? '실행 중' : '중지'}</span></td></tr>
      <tr><td><b>마지막 점검</b></td><td>${state.last_check || '-'}</td></tr>
      <tr><td><b>활성 사용자</b></td><td>${state.active_users}명</td></tr>
    </table>
  `;

  const alerts = data.recent_alerts || [];
  const alertDiv = document.getElementById('alert-list');
  if (!alerts.length) {
    alertDiv.innerHTML = '<p class="sub">최근 알림 없음</p>';
  } else {
    alertDiv.innerHTML = alerts.map(a => `
      <div style="padding:8px; margin:4px 0; background:${a.type==='loss_threshold' ? '#fde9ec' : '#e8f8ee'}; border-radius:6px; font-size:13px;">
        <b>${a.stock_name}</b> (${a.ticker}) — 수익률 <span class="${a.profit_rate >= 0 ? 'ok' : 'bad'}">${a.profit_rate.toFixed(1)}%</span>
        <br><span class="sub">${a.checked_at}</span>
      </div>
    `).join('');
  }
}

document.getElementById('monitor-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    enabled: document.getElementById('mon-enabled').checked,
    check_interval_sec: parseInt(document.getElementById('mon-interval').value),
    profit_threshold: parseFloat(document.getElementById('mon-profit').value),
    loss_threshold: parseFloat(document.getElementById('mon-loss').value),
    volatility_threshold: parseFloat(document.getElementById('mon-volatility').value),
    auto_sell_enabled: document.getElementById('mon-auto-sell').checked,
    notify_on_threshold: document.getElementById('mon-notify').checked,
  };
  const resp = await fetch('/api/v1/monitor', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await resp.json();
  if (data.ok) { alert('모니터링 설정이 저장되었습니다.'); loadMonitor(); }
  else { alert('저장 실패: ' + data.error); }
});

loadMonitor();
setInterval(loadMonitor, 30000);
</script>
{% endblock %}
